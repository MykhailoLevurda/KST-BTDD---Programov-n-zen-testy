name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build, test and static analysis (SpotBugs)
        id: build
        run: mvn -B verify -Pci

      - name: Publish JaCoCo report as artifact
        if: always() && (steps.build.outcome == 'success' || steps.build.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build and push Docker image to GHCR
        # POZOR: secrets.GHCR_NAME musí být celé malými písmeny (lowercase),
        # aby název repozitáře v GHCR splňoval pravidla.
        if: steps.build.outcome == 'success'
        env:
          IMAGE_NAME: ghcr.io/${{ secrets.GHCR_NAME }}/tool-rental
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_NAME }}" --password-stdin
          docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:${{ github.sha }}" .
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${{ github.sha }}"
